[build]
  command = ""
  publish = "dist"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/stylesheets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/javascripts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
